name: Close Linked Issues

on:
  pull_request:
    types: [closed]
    branches:
      - develop
      # Also add 'main' here if your project merges directly to main without a develop branch

jobs:
  close-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close linked issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
        run: |
          echo "$PR_BODY" | grep -oiE '(closes|fixes|resolves) #[0-9]+' | grep -oE '[0-9]+' | while read num; do
            echo "Closing issue #$num"
            gh issue close "$num" --repo "$REPO" \
              --comment "Closed automatically: fixed by PR #${{ github.event.pull_request.number }} merged to develop." || true
          done

name: External PR Guard

on:
  pull_request_target:
    types: [opened, reopened, synchronized]

permissions:
  pull-requests: write
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Reject external contributors
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const login = context.payload.pull_request.user.login;

            let isCollaborator = false;
            try {
              await github.rest.repos.checkCollaborator({ owner, repo, username: login });
              isCollaborator = true;
            } catch (_) {}

            if (isCollaborator) return;

            const prNumber = context.payload.pull_request.number;

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: prNumber,
              body: 'Thank you for your interest. This repository currently only accepts contributions from the project maintainer. This PR has been closed automatically.'
            });

            await github.rest.pulls.update({
              owner, repo,
              pull_number: prNumber,
              state: 'closed'
            });

            await github.rest.issues.lock({
              owner, repo,
              issue_number: prNumber,
              lock_reason: 'spam'
            });
